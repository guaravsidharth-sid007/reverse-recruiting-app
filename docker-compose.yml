version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: reverse-recruiting-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - reverse-recruiting-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reverse-recruiting-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:password@mongodb:27017/reverse-recruiting
      JWT_SECRET: your-secret-key-here
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - reverse-recruiting-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reverse-recruiting-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - reverse-recruiting-network

volumes:
  mongo_data:

networks:
  reverse-recruiting-network:
    driver: bridge
